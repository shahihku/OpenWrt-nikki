name: Build Nikki

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'nikki/**'
      - 'luci-app-nikki/**'
      - '.github/workflows/build-nikki.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64_generic
            sdk_target: armsr-armv8
            sdk_url: https://downloads.openwrt.org/releases/24.10.5/targets/armsr/armv8/openwrt-sdk-24.10.5-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            sdk_archive: openwrt-sdk-24.10.5-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst

          - arch: aarch64_cortex-a72
            sdk_target: bcm27xx-bcm2711
            sdk_url: https://downloads.openwrt.org/releases/24.10.5/targets/bcm27xx/bcm2711/openwrt-sdk-24.10.5-bcm27xx-bcm2711_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            sdk_archive: openwrt-sdk-24.10.5-bcm27xx-bcm2711_gcc-13.3.0_musl.Linux-x86_64.tar.zst

    env:
      PACKAGE_NAME: nikki
      LUCI_PACKAGE_NAME: luci-app-nikki

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Read package version
        run: |
          PKG_VERSION=$(sed -n 's/^PKG_VERSION:=//p' luci-app-nikki/Makefile | head -n1 | tr -d '[:space:]')
          if [ -z "$PKG_VERSION" ]; then
            echo "PKG_VERSION not found in luci-app-nikki/Makefile"
            exit 1
          fi

          echo "PKG_VERSION=$PKG_VERSION" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=nikki-${{ matrix.arch }}-$PKG_VERSION.tar.gz" >> "$GITHUB_ENV"

          echo "Using PKG_VERSION=$PKG_VERSION"
          echo "Using ARCHIVE_NAME=nikki-${{ matrix.arch }}-$PKG_VERSION.tar.gz"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev rsync unzip zlib1g-dev \
            file wget subversion swig time tar zstd python3 python3-pip python3-setuptools curl

      - name: Cache SDK archive
        uses: actions/cache@v4
        with:
          path: ${{ matrix.sdk_archive }}
          key: sdk-${{ matrix.sdk_target }}-${{ matrix.sdk_archive }}

      - name: Download OpenWrt SDK
        run: |
          if [ ! -f "${{ matrix.sdk_archive }}" ]; then
            wget -O "${{ matrix.sdk_archive }}" "${{ matrix.sdk_url }}"
          fi
          ls -lh "${{ matrix.sdk_archive }}"

      - name: Extract OpenWrt SDK
        run: |
          find . -maxdepth 1 -type d -name 'openwrt-sdk-*' -exec rm -rf {} +
          tar --use-compress-program=unzstd -xf "${{ matrix.sdk_archive }}"
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -n 1)

          if [ -z "$SDK_DIR" ]; then
            echo "SDK_DIR not found after extraction"
            exit 1
          fi

          echo "SDK_DIR=$SDK_DIR" >> "$GITHUB_ENV"
          echo "Using SDK_DIR=$SDK_DIR"

      - name: Prepare custom feed packages
        run: |
          mkdir -p "$SDK_DIR/package/custom"
          rm -rf "$SDK_DIR/package/custom/nikki"
          rm -rf "$SDK_DIR/package/custom/luci-app-nikki"

          cp -r "$GITHUB_WORKSPACE/nikki" "$SDK_DIR/package/custom/nikki"
          cp -r "$GITHUB_WORKSPACE/luci-app-nikki" "$SDK_DIR/package/custom/luci-app-nikki"

      - name: Update feeds
        working-directory: ${{ env.SDK_DIR }}
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install luci

      - name: Generate config
        working-directory: ${{ env.SDK_DIR }}
        run: |
          echo "CONFIG_PACKAGE_nikki=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-nikki=m" >> .config
          make defconfig

      - name: Build packages
        working-directory: ${{ env.SDK_DIR }}
        run: |
          make package/custom/nikki/compile V=s -j"$(nproc)"
          make package/custom/luci-app-nikki/compile V=s -j"$(nproc)"

      - name: Collect IPK files
        run: |
          mkdir -p "artifacts/${{ matrix.arch }}"
          find "$SDK_DIR/bin/packages" -type f \( -name 'nikki_*.ipk' -o -name 'luci-app-nikki_*.ipk' \) -exec cp -v {} "artifacts/${{ matrix.arch }}/" \;
          ls -lh "artifacts/${{ matrix.arch }}/"

      - name: Create tar.gz like upstream
        run: |
          tar -czf "$ARCHIVE_NAME" -C "artifacts/${{ matrix.arch }}" .
          ls -lh "$ARCHIVE_NAME"

      - name: Generate SHA256
        run: |
          sha256sum "$ARCHIVE_NAME" | awk '{print $1}' > sha256.txt
          echo "SHA256=$(cat sha256.txt)" >> "$GITHUB_ENV"
          cat sha256.txt

      - name: Upload file to API endpoint
        env:
          UPLOAD_URL: ${{ secrets.UPLOAD_URL }}
          UPLOAD_API_KEY: ${{ secrets.UPLOAD_API_KEY }}
        run: |
          RESPONSE="$(
            curl --fail --show-error --silent \
              -X POST "$UPLOAD_URL" \
              -H "Authorization: Bearer $UPLOAD_API_KEY" \
              -F "file=@$ARCHIVE_NAME" \
              -F "category=ipk_mod" \
              -F "subfolder=${{ matrix.arch }}" \
              -F "repository=${{ github.repository }}" \
              -F "sha256=${SHA256}" \
              -F "notify_telegram=1" \
              -F "pkg_name=nikki" \
              -F "pkg_version=${PKG_VERSION}" \
              -F "arch=${{ matrix.arch }}" \
              -F "mod_name=MahaVPN" \
              -F "caption_title=Nikki build automation"
          )"

          python3 - <<'PY' "$RESPONSE"
          import json, sys
          data = json.loads(sys.argv[1])
          print(f"{data.get('success')} - {data.get('message')}")
          if data.get("data"):
              import json as _json
              print(_json.dumps(data["data"], indent=2))
          PY

      - name: Done
        run: echo "Build uploaded successfully"