name: Build Nikki

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Download OpenWrt SDK
        run: |
          wget -O sdk.tar.xz https://downloads.openwrt.org/releases/24.10.5/targets/armsr/armv8/openwrt-sdk-24.10.5-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.xz
          tar -xf sdk.tar.xz
          mv openwrt-sdk-24.10.5-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64 sdk

      - name: Prepare feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install luci
          make defconfig

      - name: Copy packages
        run: |
          cp -a nikki sdk/package/
          cp -a luci-app-nikki sdk/package/

      - name: Adjust luci-app dependency for UI-only test
        run: |
          sed -i 's/+luci-base +nikki/+luci-base/' sdk/package/luci-app-nikki/Makefile

      - name: Build luci-app-nikki
        run: |
          cd sdk
          make package/luci-app-nikki/clean
          make package/luci-app-nikki/compile -j"$(nproc)" V=s

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nikki-ipk
          path: sdk/bin/packages/aarch64_generic/base/*nikki*.ipk